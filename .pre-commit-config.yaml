# Local git hooks. Install once: `uv run pre-commit install`.
# Mirrors the CI gate (ruff) and adds secret scanning (gitleaks) before commit.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
